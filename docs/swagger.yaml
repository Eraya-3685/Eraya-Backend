basePath: /api/v1
definitions:
  domain.CartItem:
    properties:
      id:
        type: integer
      product:
        $ref: '#/definitions/domain.Product'
      product_id:
        type: integer
      quantity:
        type: integer
      user_id:
        type: integer
    type: object
  domain.Category:
    properties:
      id:
        type: integer
      image_url:
        type: string
      name:
        type: string
      product_count:
        type: integer
    type: object
  domain.Order:
    properties:
      confirmed_at:
        type: string
      created_at:
        type: string
      delivered_at:
        type: string
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/domain.OrderItem'
        type: array
      order_status:
        type: string
      payment_method:
        type: string
      payment_status:
        type: string
      shipped_at:
        type: string
      shipping_address:
        type: string
      total_price:
        type: number
      tracking_number:
        type: string
      trx_id:
        type: string
      user:
        $ref: '#/definitions/domain.User'
      user_id:
        type: integer
    type: object
  domain.OrderItem:
    properties:
      id:
        type: integer
      order_id:
        type: integer
      price_at_purchase:
        type: number
      product:
        $ref: '#/definitions/domain.Product'
      product_id:
        type: integer
      quantity:
        type: integer
    type: object
  domain.Product:
    properties:
      average_rating:
        type: number
      base_price:
        type: number
      categories:
        items:
          $ref: '#/definitions/domain.Category'
        type: array
      category_id:
        type: integer
      category_ids:
        items:
          type: integer
        type: array
      created_at:
        type: string
      description:
        type: string
      discount_percentage:
        type: integer
      discount_price:
        type: number
      id:
        type: integer
      image_url:
        type: string
      images:
        items:
          $ref: '#/definitions/domain.ProductImage'
        type: array
      is_active:
        type: boolean
      name:
        type: string
      sales_count:
        type: integer
      slug:
        type: string
      stock_count:
        type: integer
      total_reviews:
        type: integer
    type: object
  domain.ProductImage:
    properties:
      id:
        type: integer
      image_url:
        type: string
      is_primary:
        type: boolean
      product_id:
        type: integer
    type: object
  domain.Review:
    properties:
      comment:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_approved:
        type: boolean
      is_verified:
        type: boolean
      product_id:
        type: integer
      rating:
        type: integer
      user:
        $ref: '#/definitions/domain.User'
      user_id:
        type: integer
    type: object
  domain.StoreSettings:
    properties:
      free_shipping_threshold:
        type: number
      id:
        type: integer
      standard_delivery_fee:
        type: number
      store_address:
        type: string
      store_email:
        type: string
      store_phone:
        type: string
      tax_percentage:
        type: number
    type: object
  domain.User:
    properties:
      address:
        type: string
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      permissions:
        items:
          type: string
        type: array
      phone:
        type: string
      role:
        type: string
      social_id:
        type: string
    type: object
  order.addToCartReq:
    properties:
      product_id:
        type: integer
      quantity:
        type: integer
    type: object
  order.checkoutItem:
    properties:
      product_id:
        type: integer
      quantity:
        type: integer
    type: object
  order.checkoutReq:
    properties:
      items:
        items:
          $ref: '#/definitions/order.checkoutItem'
        type: array
      payment_method:
        type: string
      shipping_address:
        type: string
    type: object
  order.updateStatusReq:
    properties:
      estimated_date:
        type: string
      status:
        type: string
    type: object
  review.createReviewReq:
    properties:
      comment:
        type: string
      product_id:
        type: integer
      rating:
        type: integer
    type: object
  user.bulkUpdateRoleReq:
    properties:
      ids:
        items:
          type: integer
        type: array
      otp:
        type: string
      password:
        type: string
      permissions:
        items:
          type: string
        type: array
      role:
        type: string
    type: object
  user.forgotPasswordReq:
    properties:
      email:
        type: string
    type: object
  user.loginReq:
    properties:
      identifier:
        type: string
      password:
        type: string
    type: object
  user.otpRequest:
    properties:
      purpose:
        description: e.g., "password", "email", "phone"
        type: string
    type: object
  user.resetPasswordReq:
    properties:
      email:
        type: string
      otp:
        type: string
      password:
        type: string
    type: object
  user.secureUpdateReq:
    properties:
      email:
        type: string
      otp:
        type: string
      password:
        type: string
      phone:
        type: string
      purpose:
        type: string
    type: object
  user.socialLoginReq:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      full_name:
        type: string
      social_id:
        type: string
    type: object
  user.updateProfileReq:
    properties:
      address:
        type: string
      email:
        type: string
      full_name:
        type: string
      phone:
        type: string
    type: object
  user.updateRoleReq:
    properties:
      role:
        type: string
    type: object
  util.PaginatedData:
    properties:
      data: {}
      pagination:
        $ref: '#/definitions/util.Pagination'
    type: object
  util.Pagination:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
host: eraya-backend.onrender.com
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a professional ecommerce server for Eraya.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Eraya Ecommerce API
  version: "1.0"
paths:
  /admin/orders:
    get:
      description: Retrieve a list of all orders in the system (admin only).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Order'
            type: array
        "403":
          description: Forbidden
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: List all orders (Admin)
      tags:
      - admin
  /admin/orders/{id}:
    delete:
      description: Remove an order from the system (admin only).
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete an order (Admin)
      tags:
      - admin
  /admin/orders/{id}/confirm:
    post:
      description: Mark an order as confirmed and paid (admin only).
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Confirm an order (Admin)
      tags:
      - admin
  /admin/orders/{id}/status:
    put:
      consumes:
      - application/json
      description: Update the status and estimated delivery date of an order (admin/moderator
        only).
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      - description: Status Update Details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/order.updateStatusReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Update order status (Admin)
      tags:
      - admin
  /admin/orders/request-delete-otp:
    post:
      description: Send an OTP to the admin's email to authorize order deletion.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Request OTP for order deletion (Admin)
      tags:
      - admin
  /admin/reviews:
    get:
      description: Retrieve all reviews (admin only).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Review'
            type: array
      security:
      - BearerAuth: []
      summary: List all reviews
      tags:
      - reviews
  /admin/reviews/{id}/approve:
    post:
      description: Approve a pending review (admin only).
      parameters:
      - description: Review ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Approve a review
      tags:
      - reviews
  /admin/upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload an image to the 'categories' folder (admin only).
      parameters:
      - description: Image file
        in: formData
        name: image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upload a general image
      tags:
      - admin
  /cart:
    get:
      description: Retrieve all items in the logged-in user's shopping cart.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.CartItem'
            type: array
        "403":
          description: Forbidden
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: View shopping cart
      tags:
      - cart
    post:
      consumes:
      - application/json
      description: Add a product to the user's shopping cart (buyers only).
      parameters:
      - description: Product Details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/order.addToCartReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Add a product to cart
      tags:
      - cart
  /categories:
    get:
      description: Retrieve a list of all product categories.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Category'
            type: array
      summary: List all categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Add a new category (admin only).
      parameters:
      - description: Category Details
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/domain.Category'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Category'
      security:
      - BearerAuth: []
      summary: Create a new category
      tags:
      - categories
  /categories/{id}:
    delete:
      description: Remove a category by ID (admin only).
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete a category
      tags:
      - categories
    put:
      consumes:
      - application/json
      description: Rename an existing product category.
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated Category Info
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/domain.Category'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Category'
      security:
      - BearerAuth: []
      summary: Update a category
      tags:
      - categories
  /categories/bulk:
    delete:
      consumes:
      - application/json
      description: Remove multiple categories by IDs (admin only).
      parameters:
      - description: Category IDs to delete
        in: body
        name: ids
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Bulk delete categories
      tags:
      - categories
  /orders:
    get:
      description: Retrieve a list of all orders placed by the logged-in user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Order'
            type: array
        "403":
          description: Forbidden
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get order history
      tags:
      - orders
  /orders/checkout:
    post:
      consumes:
      - application/json
      description: Create an order from the items in the cart (buyers only).
      parameters:
      - description: Checkout Details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/order.checkoutReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Order'
        "400":
          description: Bad Request
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Place an order
      tags:
      - orders
  /products:
    get:
      description: Retrieve a paginated list of active products.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Search products
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.PaginatedData'
      summary: List all products
      tags:
      - products
    post:
      consumes:
      - multipart/form-data
      description: Add a new product and upload images to Supabase (admin only).
      parameters:
      - description: Product Name
        in: formData
        name: name
        required: true
        type: string
      - description: Product Description
        in: formData
        name: description
        type: string
      - description: Base Price
        in: formData
        name: base_price
        required: true
        type: number
      - description: Discount Price
        in: formData
        name: discount_price
        type: number
      - description: Stock Count
        in: formData
        name: stock_count
        required: true
        type: integer
      - description: Category ID
        in: formData
        name: category_id
        type: integer
      - description: Product Images
        in: formData
        name: images
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Product'
      security:
      - BearerAuth: []
      summary: Create a new product with images
      tags:
      - products
  /products/{id}:
    delete:
      description: Remove a product and its images (admin only).
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete a product
      tags:
      - products
    put:
      consumes:
      - application/json
      description: Update product details (admin only).
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated Product Details
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/domain.Product'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Update an existing product
      tags:
      - products
  /products/{slug}:
    get:
      description: Retrieve details of a product by its slug.
      parameters:
      - description: Product Slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Product'
        "404":
          description: Not Found
          schema:
            type: string
      summary: Get a single product
      tags:
      - products
  /products/bulk:
    delete:
      consumes:
      - application/json
      description: Remove multiple products and their images by IDs (admin only).
      parameters:
      - description: Product IDs to delete
        in: body
        name: ids
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Bulk delete products
      tags:
      - products
  /reviews:
    post:
      consumes:
      - application/json
      description: Submit a rating and comment for a product (buyers only).
      parameters:
      - description: Review Details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/review.createReviewReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Review'
        "403":
          description: Forbidden
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Submit a product review
      tags:
      - reviews
  /reviews/{id}:
    delete:
      description: Remove a review (admin only).
      parameters:
      - description: Review ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete a review
      tags:
      - reviews
  /reviews/{productId}:
    get:
      description: Retrieve all reviews for a specific product.
      parameters:
      - description: Product ID
        in: path
        name: productId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Review'
            type: array
      summary: Get reviews for a product
      tags:
      - reviews
  /settings:
    get:
      description: Retrieve global store configuration such as banners and metadata.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.StoreSettings'
      summary: Get store settings
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: Update global store configuration (admin/moderator only).
      parameters:
      - description: Updated Settings
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.StoreSettings'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update store settings (Admin)
      tags:
      - admin
  /users:
    get:
      description: Retrieve a list of all registered users (admin only).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.User'
            type: array
      security:
      - BearerAuth: []
      summary: List all users
      tags:
      - admin
  /users/{id}:
    delete:
      description: Remove a user account and all associated data (admin only).
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete a user account
      tags:
      - admin
  /users/{id}/role:
    patch:
      consumes:
      - application/json
      description: Update the role of a user (admin only).
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: New Role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.updateRoleReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Update user role
      tags:
      - admin
  /users/avatar:
    patch:
      consumes:
      - multipart/form-data
      description: Upload a profile photo (max 5MB). Stores to Supabase and saves
        URL to DB.
      parameters:
      - description: Avatar image file
        in: formData
        name: avatar
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upload or update user avatar
      tags:
      - users
  /users/bulk-role:
    post:
      consumes:
      - application/json
      description: Update the role of multiple users at once (admin only).
      parameters:
      - description: Bulk Update Details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.bulkUpdateRoleReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Bulk update user roles
      tags:
      - admin
  /users/forgot-password:
    post:
      consumes:
      - application/json
      description: Send a reset code to the user's email if they forgot their password.
      parameters:
      - description: User Email
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.forgotPasswordReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Request password reset
      tags:
      - users
  /users/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user using email/phone and password. Returns a JWT
        token.
      parameters:
      - description: Login Details
        in: body
        name: login
        required: true
        schema:
          $ref: '#/definitions/user.loginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Login a user
      tags:
      - users
  /users/otp/request:
    post:
      consumes:
      - application/json
      description: Send a 6-digit OTP to user's email for a specific purpose (password,
        email, phone).
      parameters:
      - description: OTP Purpose
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.otpRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Request an OTP
      tags:
      - users
  /users/profile:
    get:
      description: Retrieve the profile details of the currently logged-in user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.User'
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: Update the logged-in user's name, phone, and address. Email cannot
        be changed.
      parameters:
      - description: Profile fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.updateProfileReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: Bad Request
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - users
  /users/resend-activation:
    post:
      consumes:
      - application/json
      description: Resend the account activation code to the user's email.
      parameters:
      - description: User ID
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            format: int64
            type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Resend activation OTP
      tags:
      - users
  /users/reset-password:
    post:
      consumes:
      - application/json
      description: Reset password using the code sent via ForgotPassword. Returns
        a new JWT token.
      parameters:
      - description: Reset Details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.resetPasswordReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Reset password with OTP
      tags:
      - users
  /users/secure-update:
    patch:
      consumes:
      - application/json
      description: Update password, email, or phone after OTP verification.
      parameters:
      - description: Update details and OTP
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.secureUpdateReq'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Securely update sensitive info
      tags:
      - users
  /users/signup:
    post:
      consumes:
      - multipart/form-data
      description: Create a new buyer account. Requires a valid OTP previously sent
        via /users/signup-otp.
      parameters:
      - description: Full Name
        in: formData
        name: full_name
        required: true
        type: string
      - description: Email
        in: formData
        name: email
        required: true
        type: string
      - description: Password
        in: formData
        name: password
        required: true
        type: string
      - description: Phone
        in: formData
        name: phone
        type: string
      - description: Address
        in: formData
        name: address
        type: string
      - description: OTP
        in: formData
        name: otp
        required: true
        type: string
      - description: Avatar
        in: formData
        name: avatar
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
      summary: Register a new user
      tags:
      - users
  /users/social-login:
    post:
      consumes:
      - application/json
      description: Authenticate or register a user using social provider data (e.g.
        Google).
      parameters:
      - description: Social Login Details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.socialLoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Login with social provider
      tags:
      - users
  /users/verify-signup:
    post:
      consumes:
      - application/json
      description: Verify the OTP sent to email during signup and activate the account.
      parameters:
      - description: User ID and OTP
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Verify signup OTP
      tags:
      - users
  /ws/chat:
    get:
      description: Establish a WebSocket connection for real-time messaging. Requires
        token in query param.
      parameters:
      - description: Chat with User ID
        in: query
        name: with
        required: true
        type: integer
      - description: JWT Token
        in: query
        name: token
        required: true
        type: string
      responses: {}
      summary: Connect to real-time chat
      tags:
      - chat
schemes:
- https
- http
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
